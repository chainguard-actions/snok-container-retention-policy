name: Test dry-run mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          account: snok
          token: ${{ github.token }}
          image-names: container-retention-policy
          cut-off: 1000d
          dry-run: 'true'
          tag-selection: both
          keep-n-most-recent: '0'
        continue-on-error: true
      - name: Assert action ran (outputs exist or step completed)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          DELETED: ${{ steps.action.outputs.deleted }}
          FAILED: ${{ steps.action.outputs.failed }}
        run: |
          echo "outcome: $OUTCOME"
          echo "deleted: $DELETED"
          echo "failed: $FAILED"
          # The action may fail due to auth (token doesn't have packages:read for snok org)
          # but it should at least have run (outcome is success or failure, not skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
