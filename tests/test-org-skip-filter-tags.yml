name: Test org account with skip-tags and filter-tags
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          account-type: org
          org-name: my-test-org
          image-names: my-test-image,another-image
          cut-off: '2 days ago UTC'
          token: fake-token-for-test
          skip-tags: 'latest,stable'
          filter-tags: 'dev-*,pr-*'
          dry-run: 'true'
          untagged-only: 'false'
          keep-at-least: '1'
          filter-include-untagged: 'true'
          timestamp-to-use: created_at

      - name: Assert action ran
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step completed with skip-tags and filter-tags inputs"
