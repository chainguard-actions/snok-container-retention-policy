name: Test keep-n-most-recent option
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        name: Run container retention policy keeping N most recent
        uses: .
        continue-on-error: true
        with:
          account: ${{ github.repository_owner }}
          token: ${{ github.token }}
          image-names: nonexistent-test-image-act-harness-zzz
          cut-off: 7d
          dry-run: 'true'
          tag-selection: tagged
          keep-n-most-recent: '5'
          timestamp-to-use: updated_at

      - name: Assert action ran with keep-n-most-recent option
        env:
          OUTCOME: ${{ steps.action.outcome }}
          DELETED: ${{ steps.action.outputs.deleted }}
          FAILED: ${{ steps.action.outputs.failed }}
        run: |
          echo "outcome: '$OUTCOME'"
          echo "deleted: '$DELETED'"
          echo "failed: '$FAILED'"
          # The action should either succeed or fail gracefully.
          # With keep-n-most-recent=5 and a non-existent image, nothing should be deleted.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced an outcome"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
