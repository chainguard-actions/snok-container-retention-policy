name: Test keep-n-most-recent option
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: container-retention-policy
        uses: .
        continue-on-error: true
        with:
          account: ${{ github.repository_owner }}
          token: ${{ github.token }}
          image-names: nonexistent-test-image-for-act-testing
          cut-off: 7d
          dry-run: 'true'
          tag-selection: both
          keep-n-most-recent: '5'
          timestamp-to-use: created_at

      - name: Assert action ran with keep-n-most-recent option
        env:
          OUTCOME: ${{ steps.container-retention-policy.outcome }}
          DELETED: ${{ steps.container-retention-policy.outputs.deleted }}
          FAILED: ${{ steps.container-retention-policy.outputs.failed }}
        run: |
          echo "outcome: '$OUTCOME'"
          echo "deleted: '$DELETED'"
          echo "failed: '$FAILED'"
          # The action should either succeed (no images found) or fail gracefully
          if [ "$OUTCOME" = "success" ]; then
            echo "PASS: action completed successfully with keep-n-most-recent=5 and timestamp-to-use=created_at"
          elif [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran (may fail for nonexistent image, which is expected)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
