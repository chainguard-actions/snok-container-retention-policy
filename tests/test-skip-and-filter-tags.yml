name: Test skip-tags and filter-tags inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          account-type: personal
          image-names: my-test-image
          cut-off: '1 second ago UTC'
          token: fake-token-for-dry-run
          dry-run: 'true'
          skip-tags: 'latest,stable'
          filter-tags: 'dev-*,pr-*'
          keep-at-least: '1'
          untagged-only: 'false'
          filter-include-untagged: 'false'
          timestamp-to-use: created_at

      - name: Assert action ran with skip-tags and filter-tags
        run: |
          echo "Action completed with outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step executed with skip-tags and filter-tags inputs"
