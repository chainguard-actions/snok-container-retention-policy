name: Test basic dry-run
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          account: snok
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: container-retention-policy
          cut-off: 100y
          dry-run: 'true'
      - name: Assert deleted output is defined
        env:
          DELETED: ${{ steps.action.outputs.deleted }}
          FAILED: ${{ steps.action.outputs.failed }}
        run: |
          echo "deleted: '$DELETED'"
          echo "failed: '$FAILED'"
          # In dry-run mode, nothing should actually be deleted
          # The outputs may be empty strings or contain image names
          # We just verify the action completed successfully (exit 0)
          echo "PASS: action completed in dry-run mode"
