name: Test basic dry-run usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        name: Run container retention policy in dry-run mode
        uses: .
        continue-on-error: true
        with:
          account: ${{ github.repository_owner }}
          token: ${{ github.token }}
          image-names: nonexistent-test-image-act-harness-zzz
          cut-off: 1y
          dry-run: 'true'
          tag-selection: both
          keep-n-most-recent: '0'

      - name: Assert action ran (dry-run mode, non-existent image)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          DELETED: ${{ steps.action.outputs.deleted }}
          FAILED: ${{ steps.action.outputs.failed }}
        run: |
          echo "outcome: '$OUTCOME'"
          echo "deleted: '$DELETED'"
          echo "failed: '$FAILED'"
          # The action should either succeed (empty results for non-existent image)
          # or fail gracefully. Either way the workflow should not hard-fail here.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced an outcome"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
