name: Test filter-tags and skip-tags inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          account-type: personal
          image-names: my-test-image,another-image
          cut-off: 1 month ago UTC
          token: fake-token-for-dry-run
          dry-run: 'true'
          keep-at-least: '0'
          timestamp-to-use: created_at
          untagged-only: 'false'
          skip-tags: latest,stable
          filter-tags: 'dev-*,pr-*'
          filter-include-untagged: 'false'

      - name: Assert action ran (dry-run mode, API failure is expected with fake token)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step completed with filter-tags and skip-tags inputs"
