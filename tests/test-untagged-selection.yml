name: Test untagged tag-selection
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          account: snok
          token: ${{ github.token }}
          image-names: container-retention-policy
          cut-off: 1000d
          dry-run: 'true'
          tag-selection: untagged
          keep-n-most-recent: '0'
        continue-on-error: true
      - name: Assert action ran with untagged selection
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with outcome=$OUTCOME"
