name: Test untagged image selection
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        name: Run container retention policy with untagged selection
        uses: .
        continue-on-error: true
        with:
          account: ${{ github.repository_owner }}
          token: ${{ github.token }}
          image-names: nonexistent-test-image-act-harness-zzz
          cut-off: 30d
          dry-run: 'true'
          tag-selection: untagged
          keep-n-most-recent: '0'

      - name: Assert action ran with untagged selection
        env:
          OUTCOME: ${{ steps.action.outcome }}
          DELETED: ${{ steps.action.outputs.deleted }}
          FAILED: ${{ steps.action.outputs.failed }}
        run: |
          echo "outcome: '$OUTCOME'"
          echo "deleted: '$DELETED'"
          echo "failed: '$FAILED'"
          # The action should either succeed or fail gracefully.
          # With untagged selection and a non-existent image, nothing should be deleted.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced an outcome"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
