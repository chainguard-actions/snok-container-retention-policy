name: Test tag-selection input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: container-retention-policy
        uses: .
        continue-on-error: true
        with:
          account: user
          token: fake-token-for-act-testing
          image-names: nonexistent-test-image-for-act
          cut-off: 2d
          tag-selection: untagged
          dry-run: 'true'
      - name: Assert action step ran with untagged selection
        env:
          OUTCOME: ${{ steps.container-retention-policy.outcome }}
          DELETED: ${{ steps.container-retention-policy.outputs.deleted }}
          FAILED: ${{ steps.container-retention-policy.outputs.failed }}
        run: |
          echo "outcome: '$OUTCOME'"
          echo "deleted: '$DELETED'"
          echo "failed: '$FAILED'"
          if [ "$OUTCOME" != "success" ] && [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected outcome to be 'success' or 'failure', got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action step ran with tag-selection=untagged (outcome=$OUTCOME)"
