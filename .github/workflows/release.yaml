# See https://docs.docker.com/build/ci/github-actions/multi-platform/ for docs

name: Create multi-platform container image

on:
  workflow_dispatch:
    inputs:
      version-tag:
        description: The image tag to build for
        required: true
        type: string

concurrency:
  group: ${{ inputs.version-tag }}
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: ghcr.io/snok/container-retention-policy

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            arch: amd64
            target_dir: x86_64-unknown-linux-musl
          - platform: linux/arm64
            arch: arm64
            target_dir: aarch64-unknown-linux-musl
    steps:
      - name: Prepare
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          safe_platform=$(printf '%s' "$MATRIX_PLATFORM" | tr -d '\n\r')
          echo "PLATFORM_PAIR=${safe_platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: ${{ inputs.version-tag }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          digest=$(printf '%s' "$BUILD_DIGEST" | tr -d '\n\r')
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: ${{ inputs.version-tag }}

      - name: Create manifest list and push
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect image
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          META_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          safe_version=$(printf '%s' "$META_VERSION" | tr -d '\n\r')
          docker buildx imagetools inspect "${REGISTRY_IMAGE}:${safe_version}"
