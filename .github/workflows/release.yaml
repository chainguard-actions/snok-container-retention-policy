name: Create multi-platform container image

on:
  workflow_dispatch:
    inputs:
      version-tag:
        description: The image tag to build for
        required: true
        type: string

concurrency:
  group: ${{ inputs.version-tag }}
  cancel-in-progress: true

permissions: {}

env:
  REGISTRY_IMAGE: ghcr.io/snok/container-retention-policy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            arch: amd64
            target_dir: x86_64-unknown-linux-musl
          - platform: linux/arm64
            arch: arm64
            target_dir: aarch64-unknown-linux-musl
    steps:
      - name: Prepare
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          safe_platform=$(printf '%s' "$PLATFORM" | tr -d '\n\r')
          echo "PLATFORM_PAIR=${safe_platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          digest=$(printf '%s' "$BUILD_DIGEST" | tr -d '\n\r')
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}-${{ inputs.version-tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: /tmp/digests
          pattern: digests-*-${{ inputs.version-tag }}
          merge-multiple: true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          VERSION_TAG: ${{ inputs.version-tag }}
        run: |
          image_refs=()
          for digest_file in *; do
            image_refs+=("$REGISTRY_IMAGE@sha256:$digest_file")
          done
          docker buildx imagetools create \
            -t "$REGISTRY_IMAGE:$VERSION_TAG" \
            "${image_refs[@]}"

      - name: Inspect image
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY_IMAGE }}
          VERSION_TAG: ${{ inputs.version-tag }}
        run: docker buildx imagetools inspect "$REGISTRY_IMAGE:$VERSION_TAG"
