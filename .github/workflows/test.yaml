name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # This is already installed on GitHub's runners
      - run: cargo fmt --check

      - run: rustup toolchain install stable --profile minimal && rustup component add clippy
      - run: rustup toolchain install nightly --profile minimal
      - uses: cargo-bins/cargo-binstall@57726869e28f4038a847ec56e5fdd9142fded110 # main
      - run: cargo binstall cargo-udeps --locked --no-confirm --force
      - run: cargo binstall cargo-audit --locked --no-confirm --force
      - run: pip install pre-commit && pre-commit install
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit/
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: cargo build  # needed for `assert_cmd` tests
      - run: pre-commit run --all-files
